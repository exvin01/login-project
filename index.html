<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Login to your Login Portal account">
  <title>Login - Login Portal</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <nav class="container">
      <div class="logo">Login Portal</div>
    </nav>
  </header>

  <div class="form-container">
    <h2 style="text-align: center; margin-bottom: 30px;">Welcome Back</h2>
    <form id="loginForm" action="/login" method="POST">
      <div class="form-group">
        <label>Student Number</label>
        <input type="text" name="stdnumber" placeholder="Enter your student ID" required>
        <div class="error"></div>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="stdpass" placeholder="Enter password" required>
        <div class="error"></div>
      </div>
      <button type="submit" class="btn" style="width: 100%; margin-top: 20px;">Login</button>
    </form>
    <p style="text-align: center; margin-top: 20px;">
      Don't have an account? <a href="signup.html">Sign up here</a>
    </p>
  </div>
</body>
</html>

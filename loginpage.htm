<!DOCTYPE HTML>

<html>

<head>
  <title>logIn page</title>

</head>
      <style>
      body {
      background-image: url(untitled-1.jpg);
      background-repeat: repeat;
      background-size: cover;
      background-color: transparent;
      justify-items: center;
      color: #fff;
      margin-top: 50px;
      font-size: 2em;
}
.p1{
    font-size: 1.3em;
    font-style: italic;
}
div{
    border: 3px solid darkgrey;
    display: grid;
    padding: 50px;
    font-size: 1.8em;
    box-shadow: 10px 18px 16px 4px white;
}
div:hover{
    transform: scale(1.1);
}

input{
       font-size: 0.3em;
       margin-top: 20px;
       margin-bottom: 20px;
       height: 2.5em;
       border-radius: 10px;
       border: 2.5px solid grey;
       padding-left: 15px;
 }
 input:hover{
     transform: scale(1.1);
 }

button{
    font-size: 0.6em;
    cursor: pointer;
    background-color: black;
    color: #fff;
    border-radius: 15px;
    padding: 3px;
    border: solid 1px;
}
button:hover{
     transform: scale(1.1);
 }
      </style>
<body>
       <h1>STUDENT PORTAL</h1>
       <p class="p1"> please enter correct credentials</p>
       <form action="http://localhost:3000/submit" method="POST">
       <div container1>
            <code>Enter student number</code>
            <input id="stdname" type="textbox" name="stdnumber" required placeholder="std001" />
            <code>Enter password</code>
            <input id="stdpass" type="password" name="stdpass" required>
            <button id="logIn">Log In</button>



       </div>  <br>
       </form>
               <p id="infor"></p>

</body>

</html>
